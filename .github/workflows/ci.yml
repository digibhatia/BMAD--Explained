name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-and-evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax / import check
        run: |
          python -m py_compile $(find . -name "*.py" -not -path "./venv/*")

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Run RAG + agent evaluation suite
        run: python monitoring/run_evaluation.py

      - name: Enforce evaluation quality gate
        run: |
          python monitoring/check_eval_threshold.py --min-groundedness 0.85 --min-escalation-accuracy 1.0
